<!doctype html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=1440"/>
<title>流光后台 v2 · Resovo Admin</title>
<link rel="stylesheet" href="styles/tokens.css"/>
<link rel="stylesheet" href="styles/components.css"/>
<style>
  /* a few extra inline tweaks specific to this page */
  .home-hero {
    padding: 36px 32px;
    background: linear-gradient(135deg, var(--accent-soft), transparent 60%), var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 16px;
  }
  .home-hero h1 { font-size: 28px; font-weight: 700; margin: 0 0 8px; }
  .home-hero p { color: var(--muted); margin: 0 0 14px; }
  .route-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .route-card {
    padding: 14px; background: var(--bg2); border: 1px solid var(--border);
    border-radius: 10px; cursor: pointer; transition: border-color .12s, transform .12s;
    text-decoration: none; color: var(--text); display: block;
  }
  .route-card:hover { border-color: var(--accent); transform: translateY(-1px); }
  .route-card__title { font-weight: 600; font-size: 13px; display: flex; align-items: center; gap: 8px; }
  .route-card__sub { font-size: 11px; color: var(--muted); margin-top: 4px; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="app/icons-data.jsx"></script>
<script type="text/babel" src="app/datatable.jsx"></script>
<script type="text/babel" src="app/shell.jsx"></script>
<script type="text/babel" src="app/screens-1.jsx"></script>
<script type="text/babel" src="app/screens-2.jsx"></script>
<script type="text/babel" src="app/screens-3.jsx"></script>
<script type="text/babel" src="app/video-edit-drawer.jsx"></script>
<script type="text/babel" src="app/notifications.jsx"></script>

<script type="text/babel" data-presets="env,react">
const { useState, useEffect } = React;

const ROUTES = {
  dashboard:     { label: "管理台站",      crumb: ["运营中心", "管理台站"],          comp: () => <Dashboard/> },
  moderation:    { label: "内容审核",      crumb: ["运营中心", "内容审核"],          comp: () => <ModerationConsole/> },
  staging:       { label: "待发布",        crumb: ["采集中心", "待发布"],            comp: () => <StagingView/> },
  videos:        { label: "视频库",        crumb: ["内容资产", "视频库"],            comp: () => <VideosView/> },
  sources:       { label: "播放线路",      crumb: ["内容资产", "播放线路"],          comp: () => <SourcesView/> },
  merge:         { label: "合并拆分",      crumb: ["内容资产", "合并拆分"],          comp: () => <MergeView/> },
  subtitles:     { label: "字幕管理",      crumb: ["内容资产", "字幕管理"],          comp: () => <SubtitlesView/> },
  home:          { label: "首页编辑",      crumb: ["首页运营", "首页编辑"],          comp: () => <HomeOpsView/> },
  submissions:   { label: "用户投稿",      crumb: ["首页运营", "用户投稿"],          comp: () => <SubmissionsView/> },
  crawler:       { label: "采集控制",      crumb: ["采集中心", "采集控制"],          comp: () => <CrawlerView/> },
  "image-health":{ label: "图片健康",      crumb: ["内容资产", "图片健康"],          comp: () => <ImageHealthView/> },
  analytics:     { label: "数据看板",      crumb: ["系统管理", "数据看板"],          comp: () => <AnalyticsView/> },
  users:         { label: "用户管理",      crumb: ["系统管理", "用户管理"],          comp: () => <UsersView/> },
  settings:      { label: "站点设置",      crumb: ["系统管理", "站点设置"],          comp: () => <SettingsView/> },
  audit:         { label: "审计日志",      crumb: ["系统管理", "审计日志"],          comp: () => <AuditView/> },
  login:         { label: "登录",          crumb: [],                                comp: () => <LoginView/> },
};

/* Global drawer state — shared via window so all screens can open it */
window.__editDrawer = { open: false, videoId: null, setOpen: null, setVideoId: null };
const openEditDrawer = (videoId) => {
  if (window.__editDrawer.setVideoId) window.__editDrawer.setVideoId(videoId);
  if (window.__editDrawer.setOpen) window.__editDrawer.setOpen(true);
};
window.openEditDrawer = openEditDrawer;

const App = () => {
  const initial = window.location.hash.replace("#", "") || "dashboard";
  const [route, setRoute] = useState(ROUTES[initial] ? initial : "dashboard");
  const [theme, setTheme] = useState(document.documentElement.dataset.theme || "dark");
  const [drawerOpen, setDrawerOpen] = useState(false);
  const [drawerVideoId, setDrawerVideoId] = useState(null);

  // Expose to global
  window.__editDrawer.setOpen = setDrawerOpen;
  window.__editDrawer.setVideoId = setDrawerVideoId;

  useEffect(() => {
    const onHash = () => {
      const r = window.location.hash.replace("#", "") || "dashboard";
      if (ROUTES[r]) setRoute(r);
    };
    window.addEventListener("hashchange", onHash);
    return () => window.removeEventListener("hashchange", onHash);
  }, []);

  const nav = (id) => { window.location.hash = id; setRoute(id); };

  useEffect(() => {
    document.documentElement.dataset.theme = theme;
  }, [theme]);

  const r = ROUTES[route] || ROUTES.dashboard;

  if (route === "login") return r.comp();

  return (
    <>
      <AdminShell
        active={route}
        onNav={nav}
        crumbs={r.crumb}
        theme={theme}
        onTheme={() => setTheme((t) => t === "dark" ? "light" : "dark")}
      >
        {r.comp()}
      </AdminShell>
      <VideoEditDrawer
        open={drawerOpen}
        onClose={() => setDrawerOpen(false)}
        videoId={drawerVideoId}
      />
      <ToastContainer />
    </>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
