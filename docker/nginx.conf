# Resovo 反向代理配置
# 路由规则：
#   /v1/*      → api:4000    （Fastify API）
#   /admin/*   → server:3001 （后台 Next.js）
#   /*         → web:3000    （前台 Next.js）
#
# 本地开发代理（docker/docker-compose.dev.yml）使用 host.docker.internal。
# 生产部署将 upstream 中的主机名替换为实际服务名或 IP。
#
# Cookie 说明：refresh_token 由 /v1/auth/ 设置，Path=/，HttpOnly，SameSite=Lax。
# 同域路由下三个进程均可正确接收和发送该 Cookie，无需额外配置。

upstream web {
    server host.docker.internal:3000;
    keepalive 32;
}

upstream api {
    server host.docker.internal:4000;
    keepalive 32;
}

upstream server {
    server host.docker.internal:3001;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # 通用代理头（注入到所有 location）
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;

    # ── 1. API (/v1/) ──────────────────────────────────────────────
    location /v1/ {
        proxy_pass http://api;
    }

    # ── 2. 后台静态资源 (/admin/_next/) ──────────────────────────────
    # assetPrefix=/admin 使 server 应用在 HTML 中生成 /admin/_next/... 引用；
    # nginx 收到后剥除 /admin 前缀，转发给 server:3001 的 /_next/ 路径。
    location /admin/_next/ {
        rewrite ^/admin(/_next/.*)$ $1 break;
        proxy_pass http://server;
    }

    # ── 3. 后台应用 (/admin) ─────────────────────────────────────────
    location /admin {
        proxy_pass http://server;
    }

    # ── 4. 前台应用（默认） ──────────────────────────────────────────
    location / {
        proxy_pass http://web;
    }
}
