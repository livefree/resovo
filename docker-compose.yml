version: '3.9'

services:
  # ── PostgreSQL 16 ──────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: resovo_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: resovo
      POSTGRES_PASSWORD: resovo_dev
      POSTGRES_DB: resovo_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/api/db/migrations/001_init_tables.sql:/docker-entrypoint-initdb.d/001_init_tables.sql:ro
      - ./src/api/db/migrations/002_indexes.sql:/docker-entrypoint-initdb.d/002_indexes.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U resovo -d resovo_dev']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Elasticsearch 8.x + IK + 拼音插件 ──────────────────────────────
  elasticsearch:
    image: elasticsearch:8.17.0
    container_name: resovo_elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - 'ES_JAVA_OPTS=-Xms512m -Xmx512m'
    ports:
      - '9200:9200'
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'curl -sf http://localhost:9200/_cluster/health | grep -qE "\"status\":\"(green|yellow)\""',
        ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ── Elasticsearch 插件安装（一次性任务）─────────────────────────────
  elasticsearch-setup:
    image: elasticsearch:8.17.0
    container_name: resovo_elasticsearch_setup
    restart: 'no'
    depends_on:
      elasticsearch:
        condition: service_healthy
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
      - ./src/api/db/migrations/es_mapping.json:/tmp/es_mapping.json:ro
    entrypoint: >
      bash -c "
        echo 'Installing IK analyzer plugin...' &&
        elasticsearch-plugin install --batch https://release.infinilabs.com/analysis-ik/stable/elasticsearch-analysis-ik-8.17.0.zip &&
        echo 'Installing Pinyin plugin...' &&
        elasticsearch-plugin install --batch https://release.infinilabs.com/analysis-pinyin/stable/elasticsearch-analysis-pinyin-8.17.0.zip &&
        echo 'Plugins installed. Restarting Elasticsearch...' ||
        echo 'Plugins may already be installed, skipping...'
      "

  # ── Redis 7 ────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: resovo_redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'PING']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
  elasticsearch_data:
    driver: local
  redis_data:
    driver: local
